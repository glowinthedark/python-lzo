name: Build/release wheels for Windows x64

on:
  workflow_dispatch:
    inputs:
      custom_ref:
        description: 'custom ref/tag'
        required: false
      do_release:
        description: 'Creating release from artifacts: type "y" to enable'
        required: false
jobs:
  build-w64:
    runs-on:
      - windows-latest
      #x- windows-latest-arm64
    defaults:
      run:
        shell: cmd
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    name: ${{ matrix.python-version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Run cmake
        working-directory: .\lzo-2.10
        run: |
          md build
          cd build
          cmake .. -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v3
        # with:
        #   msbuild-architecture: x64
      - name: Build lzo static lib
        working-directory: .\lzo-2.10\build
        run: msbuild lzo_static_lib.vcxproj -p:Configuration=Release;Platform=x64;OutDir=..\
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
#          architecture: x64
      - name: Build wheel
        env:
          LZO_DIR: .\lzo-2.10
        run: |
          python -m pip install -U pip wheel build
          python -m build
          ls -l dist
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-py${{ matrix.python-version }}
          path: dist\*.whl
          overwrite: true
          if-no-files-found: error

  release:
    if: ${{ github.event.inputs.do_release == 'y' && github.event.inputs.custom_ref != '' }}
    needs: [build-w64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: true

      - name: List all files
        run: ls -R ./artifacts

      - name: do release
        run: |
          TAG='${{ github.event.inputs.custom_ref }}'
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — uploading/replacing assets only"
          else
            gh release create "$TAG" \
              -t "$TAG" \
              --title "${{ github.event.repository.name }}-$TAG" \
              --target '${{ github.ref_name }}' \
              --latest=true \
              --generate-notes \
              --repo "$GITHUB_REPOSITORY"
          fi
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber \
            ./artifacts/*
