name: Build wheels for macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version:
          - "3.8"
#          - "3.9"
#          - "3.10"
#          - "3.11"
#          - "3.12"
          - "3.13"
    name: ${{ matrix.python-version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Patch lzo CMakeLists.txt
        working-directory: ./lzo-2.10
        run: |
          sed -i '' 's/cmake_minimum_required(VERSION [0-9.]*)/cmake_minimum_required(VERSION 3.5)/' CMakeLists.txt

      - name: Run cmake
        working-directory: ./lzo-2.10
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_INSTALL_PREFIX=.. ..
      - name: Build lzo static lib
        working-directory: ./lzo-2.10/build
        run: |
          make
          make install
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          
    
      - name: Build wheel
        env:
          LZO_DIR: ./lzo-2.10
        run: |
          CFLAGS="-I./lzo-2.10/include" \
          LDFLAGS="-L./lzo-2.10/lib -Wl,-rpath,./lzo-2.10/lib" \
          python -m build --wheel
          ls -l dist
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist
          overwrite: true
          if-no-files-found: error
