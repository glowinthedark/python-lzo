name: homebrew debug

on:
  push:
    branches:
      - 'build-release'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true



jobs:
  macos:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        python-version: ['3.13']
        os:
          - macos-14
          - macos-15
      fail-fast: false
    steps:

      # - name: Update brew
      #   run: brew update

      - name: List brew formulas with versions
        run: |
          brew list --versions

